// Deterministic pseudo-random for stable visuals
const seeded = (seed) => {
  let s = seed | 0 || 1;
  return () => { s = (s * 1664525 + 1013904223) | 0; return ((s >>> 0) / 4294967295); };
};

const genSeries = (seed, points, base, variance, trend = 0) => {
  const r = seeded(seed);
  return Array.from({ length: points }, (_, i) => {
    const t = i / Math.max(1, points - 1);
    const noise = (r() - 0.5) * variance;
    const wave = Math.sin(i * 0.8 + seed) * variance * 0.25;
    return Math.max(0, base + noise + wave + trend * t * base);
  });
};

const genCategory = (seed, cats, base, spread) => {
  const r = seeded(seed);
  return cats.map((c, i) => ({ label: c, value: Math.max(1, base + (r() - 0.3) * spread + i * 2) }));
};

/* ============================================================
   CHART PRIMITIVES (custom SVG)
   ============================================================ */

const useBox = () => {
  const ref = useRef(null);
  const [size, setSize] = useState({ w: 0, h: 0 });
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver((entries) => {
      const { width, height } = entries[0].contentRect;
      setSize({ w: width, h: height });
    });
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);
  return [ref, size];
};

const buildPath = (data, w, h, padL, padT, plotW, plotH, smooth = true) => {
  if (!data.length) return '';
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = padL + (i / Math.max(1, data.length - 1)) * plotW;
    const y = padT + plotH - ((v - min) / range) * plotH;
    return [x, y];
  });
  if (!smooth) return 'M ' + points.map(p => p.join(' ')).join(' L ');
  // smooth via bezier
  let d = `M ${points[0][0]} ${points[0][1]}`;
  for (let i = 1; i < points.length; i++) {
    const [x1, y1] = points[i - 1];
    const [x2, y2] = points[i];
    const cx = (x1 + x2) / 2;
    d += ` C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`;
  }
  return d;
};

const LineChart = ({ series, height = 180, colors = ['#3b6bff'], showGrid = true, yFormat = (v) => v.toFixed(0), filled = false, compact = false }) => {
  const [ref, size] = useBox();
  const padL = compact ? 8 : 32, padR = 8, padT = 8, padB = compact ? 8 : 22;
  const plotW = Math.max(10, size.w - padL - padR);
  const plotH = Math.max(10, height - padT - padB);
  const all = series.flatMap(s => s.data);
  const min = Math.min(...all), max = Math.max(...all);
  const range = max - min || 1;
  const gridLines = showGrid && !compact ? [0, 0.25, 0.5, 0.75, 1] : [];
  return (
    <div ref={ref} style={{ height }} className="w-full">
      {size.w > 0 && (
        <svg width={size.w} height={height}>
          <defs>
            {series.map((s, i) => (
              <linearGradient key={i} id={`grad-${i}-${s.name?.replace(/\W/g,'')}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={colors[i % colors.length]} stopOpacity="0.28"/>
                <stop offset="100%" stopColor={colors[i % colors.length]} stopOpacity="0"/>
              </linearGradient>
            ))}
          </defs>
          {gridLines.map((g, i) => {
            const y = padT + plotH * g;
            const v = max - range * g;
            return (
              <g key={i}>
                <line x1={padL} y1={y} x2={size.w - padR} y2={y} className="chart-grid-line"/>
                <text x={padL - 6} y={y + 3} textAnchor="end" className="fill-ink-400 text-[10px]">{yFormat(v)}</text>
              </g>
            );
          })}
          {series.map((s, i) => {
            const path = buildPath(s.data, size.w, height, padL, padT, plotW, plotH);
            const col = colors[i % colors.length];
            return (
              <g key={i}>
                {filled && (
                  <path d={`${path} L ${padL + plotW} ${padT + plotH} L ${padL} ${padT + plotH} Z`}
                        fill={`url(#grad-${i}-${s.name?.replace(/\W/g,'')})`}/>
                )}
                <path d={path} fill="none" stroke={col} strokeWidth={2} strokeLinecap="round"/>
                {!compact && s.data.map((v, idx) => {
                  if (idx !== s.data.length - 1) return null;
                  const x = padL + (idx / Math.max(1, s.data.length - 1)) * plotW;
                  const y = padT + plotH - ((v - min) / range) * plotH;
                  return (
                    <g key={idx}>
                      <circle cx={x} cy={y} r={6} fill={col} opacity="0.15"/>
                      <circle cx={x} cy={y} r={3} fill={col}/>
                    </g>
                  );
                })}
              </g>
            );
          })}
        </svg>
      )}
    </div>
  );
};

const BarChart = ({ data, height = 200, color = '#3b6bff', horizontal = false, showLabels = true, yFormat = (v) => v.toFixed(0) }) => {
  const [ref, size] = useBox();
  const padL = horizontal ? 110 : 32, padR = 8, padT = 8, padB = 32;
  const plotW = Math.max(10, size.w - padL - padR);
  const plotH = Math.max(10, height - padT - padB);
  const max = Math.max(...data.map(d => d.value)) || 1;
  return (
    <div ref={ref} style={{ height }} className="w-full">
      {size.w > 0 && (
        <svg width={size.w} height={height}>
          {horizontal ? (
            data.map((d, i) => {
              const rowH = plotH / data.length;
              const y = padT + i * rowH + 4;
              const barH = rowH - 8;
              const w = (d.value / max) * plotW;
              return (
                <g key={i}>
                  <text x={padL - 8} y={y + barH / 2 + 3} textAnchor="end" className="fill-ink-600 text-[11px]">{d.label}</text>
                  <rect x={padL} y={y} width={plotW} height={barH} fill="#f1f5f9" rx={3}/>
                  <rect x={padL} y={y} width={w} height={barH} fill={d.color || color} rx={3}/>
                  <text x={padL + w + 4} y={y + barH / 2 + 3} className="fill-ink-700 text-[11px] font-medium">{yFormat(d.value)}</text>
                </g>
              );
            })
          ) : (
            data.map((d, i) => {
              const colW = plotW / data.length;
              const barW = colW * 0.6;
              const x = padL + i * colW + (colW - barW) / 2;
              const h = (d.value / max) * plotH;
              const y = padT + plotH - h;
              return (
                <g key={i}>
                  <rect x={x} y={y} width={barW} height={h} fill={d.color || color} rx={3}/>
                  {showLabels && <text x={x + barW / 2} y={padT + plotH + 14} textAnchor="middle" className="fill-ink-500 text-[10px]">{d.label}</text>}
                  <text x={x + barW / 2} y={y - 4} textAnchor="middle" className="fill-ink-700 text-[10px] font-medium">{yFormat(d.value)}</text>
                </g>
              );
            })
          )}
        </svg>
      )}
    </div>
  );
};

const Donut = ({ data, size = 140, thickness = 22, centerLabel, centerValue }) => {
  const total = data.reduce((a, b) => a + b.value, 0) || 1;
  const R = size / 2 - thickness / 2;
  const C = 2 * Math.PI * R;
  let offset = 0;
  return (
    <div className="flex items-center justify-center relative" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <g transform={`rotate(-90 ${size / 2} ${size / 2})`}>
          {data.map((d, i) => {
            const len = (d.value / total) * C;
            const dash = `${len} ${C - len}`;
            const el = (
              <circle key={i} cx={size / 2} cy={size / 2} r={R} fill="none"
                stroke={d.color} strokeWidth={thickness} strokeDasharray={dash} strokeDashoffset={-offset}/>
            );
            offset += len;
            return el;
          })}
        </g>
      </svg>
      {(centerLabel || centerValue) && (
        <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
          <div className="text-2xl font-bold text-ink-900">{centerValue}</div>
          <div className="text-[11px] text-ink-500 mt-0.5">{centerLabel}</div>
        </div>
      )}
    </div>
  );
};

const Gauge = ({ value, max = 100, size = 140, label, thresholds = [{ v: 60, color: '#10b981' }, { v: 85, color: '#f59e0b' }, { v: 100, color: '#ef4444' }] }) => {
  const pct = Math.min(1, value / max);
  const R = size / 2 - 14;
  const circ = Math.PI * R; // half circle
  const filled = circ * pct;
  const color = thresholds.find(t => (value / max) * 100 <= t.v)?.color || '#ef4444';
  return (
    <div className="flex flex-col items-center" style={{ width: size }}>
      <svg width={size} height={size / 2 + 14}>
        <path d={`M 14 ${size/2 + 4} A ${R} ${R} 0 0 1 ${size - 14} ${size/2 + 4}`} fill="none" stroke="#f1f5f9" strokeWidth={12} strokeLinecap="round"/>
        <path d={`M 14 ${size/2 + 4} A ${R} ${R} 0 0 1 ${size - 14} ${size/2 + 4}`} fill="none" stroke={color} strokeWidth={12} strokeLinecap="round"
          strokeDasharray={`${filled} ${circ}`}/>
      </svg>
      <div className="text-xl font-bold text-ink-900 -mt-2">{value.toFixed(0)}<span className="text-sm text-ink-400 font-medium">/{max}</span></div>
      {label && <div className="text-xs text-ink-500">{label}</div>}
    </div>
  );
};

const Sparkline = ({ data, color = '#3b6bff', height = 32, filled = true }) => {
  const [ref, size] = useBox();
  if (!data.length) return null;
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const padding = 2;
  const w = size.w;
  const pts = data.map((v, i) => {
    const x = padding + (i / Math.max(1, data.length - 1)) * (w - padding * 2);
    const y = padding + (height - padding * 2) - ((v - min) / range) * (height - padding * 2);
    return [x, y];
  });
  const path = 'M ' + pts.map(p => p.join(' ')).join(' L ');
  return (
    <div ref={ref} style={{ height }} className="w-full">
      {size.w > 0 && (
        <svg width={size.w} height={height}>
          {filled && (
            <path d={`${path} L ${w - padding} ${height - padding} L ${padding} ${height - padding} Z`} fill={color} opacity="0.14"/>
          )}
          <path d={path} fill="none" stroke={color} strokeWidth={1.6} strokeLinecap="round"/>
        </svg>
      )}
    </div>
  );
};

const DecisionTree = ({ onSelectNode, selectedNode }) => {
  const cellW = 210, cellH = 130, padX = 24, padY = 24;
  const cols = Math.max(...TREE.nodes.map(n => n.col)) + 1;
  const rows = Math.max(...TREE.nodes.map(n => n.row)) + 1;
  const width = cols * cellW + padX * 2;
  const height = rows * cellH + padY * 2;

  const nodePos = (n) => ({
    x: padX + n.col * cellW + 10,
    y: padY + n.row * cellH + 10,
    w: cellW - 20,
    h: cellH - 30,
  });

  const edgePath = (from, to) => {
    const a = nodePos(from), b = nodePos(to);
    const x1 = a.x + a.w, y1 = a.y + a.h / 2;
    const x2 = b.x,       y2 = b.y + b.h / 2;
    const mx = (x1 + x2) / 2;
    return `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
  };

  return (
    <div className="relative overflow-x-auto">
      <svg width={width} height={height} className="block">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
          </marker>
        </defs>
        {TREE.edges.map((e, i) => {
          const from = TREE.nodes.find(n => n.id === e.from);
          const to   = TREE.nodes.find(n => n.id === e.to);
          if (!from || !to) return null;
          const failing = (to.fail || 0) / Math.max(1, to.total) > 0.05;
          return (
            <g key={i}>
              <path d={edgePath(from, to)} stroke={failing ? '#f59e0b' : '#cbd5e1'} strokeWidth={failing ? 2 : 1.5} fill="none" markerEnd="url(#arr)"/>
              {e.label && (() => {
                const a = nodePos(from), b = nodePos(to);
                const mx = (a.x + a.w + b.x) / 2;
                const my = (a.y + a.h/2 + b.y + b.h/2) / 2;
                return <g><rect x={mx - 40} y={my - 8} width="80" height="16" rx="8" fill="white" stroke="#e2e8f0"/><text x={mx} y={my + 3} textAnchor="middle" className="fill-ink-600 text-[10px] font-medium">{e.label}</text></g>;
              })()}
            </g>
          );
        })}
      </svg>
      {TREE.nodes.map(n => {
        const pos = nodePos(n);
        const cfg = NODE_COLORS[n.type];
        const passRate = n.success / Math.max(1, n.total);
        const failRate = 1 - passRate;
        const critical = failRate > 0.08;
        const isSel = selectedNode?.id === n.id;
        return (
          <div key={n.id} onClick={() => onSelectNode(n)}
            className={cn('absolute node-card rounded-xl ring-1 shadow-soft', cfg.bg, isSel ? 'ring-2 ring-brand-500 shadow-lift' : cfg.ring)}
            style={{ left: pos.x, top: pos.y, width: pos.w, height: pos.h }}>
            <div className="p-3 h-full flex flex-col">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-1.5 text-ink-500 text-[10px] font-semibold uppercase tracking-wide">
                  {cfg.icon} {cfg.label}
                </div>
                {critical && <span className="pulse-dot inline-block w-1.5 h-1.5 rounded-full text-red-500 bg-red-500"/>}
              </div>
              <div className="text-[13px] font-semibold text-ink-900 mt-1 leading-snug">{n.label}</div>
              {n.model && <div className="text-[10px] text-ink-500 mono mt-0.5">{n.model}</div>}
              <div className="mt-auto">
                <div className="flex items-center justify-between text-[10px] text-ink-500">
                  <span>Pass rate</span>
                  <span className={cn('font-semibold', passRate > 0.95 ? 'text-emerald-600' : passRate > 0.9 ? 'text-amber-600' : 'text-red-600')}>
                    {(passRate * 100).toFixed(2)}%
                  </span>
                </div>
                <div className="h-1 bg-ink-100 rounded-full overflow-hidden mt-1">
                  <div className={cn('h-full', passRate > 0.95 ? 'bg-emerald-500' : passRate > 0.9 ? 'bg-amber-500' : 'bg-red-500')} style={{ width: `${passRate * 100}%` }}/>
                </div>
                <div className="flex items-center justify-between text-[10px] text-ink-400 mono mt-1">
                  <span>{n.total.toLocaleString()} runs</span>
                  <span className="text-red-500">{n.fail.toLocaleString()} fail</span>
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
};

const NodeDetailPanel = ({ node, onClose }) => {
  if (!node) return null;
  const cfg = NODE_COLORS[node.type];
  const passRate = node.success / Math.max(1, node.total);
  const reasonEntries = Object.entries(node.reasons || {});
  const branchEntries = Object.entries(node.branches || {});
  const failTrend = genSeries(node.id.charCodeAt(0) + 7, 24, Math.max(1, node.fail / 24), Math.max(1, node.fail / 40));
  return (
    <Card className="h-full flex flex-col">
      <div className="flex items-start justify-between mb-4">
        <div>
          <div className="flex items-center gap-2">
            <Badge tone={node.type === 'model' ? 'purple' : node.type === 'decision' ? 'warning' : node.type === 'tool' ? 'cyan' : node.type === 'human' ? 'success' : node.type === 'learning' ? 'brand' : 'neutral'}>{cfg.icon} {cfg.label}</Badge>
            {node.model && <Badge tone="neutral" size="sm" className="mono">{node.model}</Badge>}
          </div>
          <h3 className="text-lg font-semibold text-ink-900 mt-2">{node.label}</h3>
        </div>
        <button onClick={onClose} className="text-ink-400 hover:text-ink-600 p-1 rounded hover:bg-ink-100"><I.close/></button>
      </div>

      <div className="grid grid-cols-3 gap-3 mb-4">
        <div className="bg-ink-50 rounded-lg p-3">
          <div className="text-[10px] uppercase text-ink-500 font-semibold">Total runs</div>
          <div className="text-xl font-bold text-ink-900 mt-1">{node.total.toLocaleString()}</div>
        </div>
        <div className="bg-emerald-50 rounded-lg p-3">
          <div className="text-[10px] uppercase text-emerald-700 font-semibold">Pass rate</div>
          <div className="text-xl font-bold text-emerald-700 mt-1">{(passRate * 100).toFixed(2)}%</div>
        </div>
        <div className="bg-red-50 rounded-lg p-3">
          <div className="text-[10px] uppercase text-red-700 font-semibold">Failures</div>
          <div className="text-xl font-bold text-red-700 mt-1">{node.fail.toLocaleString()}</div>
        </div>
      </div>

      {reasonEntries.length > 0 && (
        <div className="mb-4">
          <div className="text-xs font-semibold text-ink-700 uppercase tracking-wide mb-2">Failure Reasons</div>
          <div className="space-y-2">
            {reasonEntries.map(([r, v]) => {
              const pct = v / node.fail * 100;
              return (
                <div key={r}>
                  <div className="flex justify-between text-[12px] text-ink-700">
                    <span>{r}</span>
                    <span className="mono text-ink-500">{v} ({pct.toFixed(1)}%)</span>
                  </div>
                  <div className="h-1.5 bg-ink-100 rounded-full overflow-hidden mt-1">
                    <div className="h-full bg-red-400" style={{ width: `${pct}%` }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {branchEntries.length > 0 && (
        <div className="mb-4">
          <div className="text-xs font-semibold text-ink-700 uppercase tracking-wide mb-2">Branches</div>
          <div className="space-y-2">
            {branchEntries.map(([r, v]) => (
              <div key={r} className="flex items-center justify-between bg-ink-50 rounded-lg px-3 py-2">
                <div className="flex items-center gap-2"><I.arrow_right size={14}/><span className="text-sm text-ink-800">{r}</span></div>
                <span className="mono text-xs text-ink-600">{v.toLocaleString()}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="mt-auto">
        <div className="text-xs font-semibold text-ink-700 uppercase tracking-wide mb-2">Failures / hour (24h)</div>
        <LineChart series={[{ name: 'fail', data: failTrend }]} colors={['#ef4444']} height={80} filled={true} compact={true}/>
      </div>
    </Card>
  );
};

const WidgetRenderer = ({ widget, timeRangeIdx = 2, onRemove, onPin, pinned, actions, onNavigate }) => {
  const pts = TIME_RANGES[timeRangeIdx].points;
  const span = widget.span || WIDGET_TYPES[widget.type]?.span || 'col-span-6';
  const icon = WIDGET_TYPES[widget.type]?.icon;

  let body = null;
  if (widget.type === 'kpi') {
    body = <KpiCardContent metric={widget.metric}/>;
  } else if (widget.type === 'line' || widget.type === 'area') {
    const series = widget.series.map(s => ({
      name: s.name,
      data: genSeries(s.seed, pts, s.base, s.variance),
    }));
    const colors = widget.series.map(s => s.color);
    body = (
      <div>
        <LineChart series={series} colors={colors} height={200} filled={widget.type === 'area'} yFormat={v => widget.unit === 'ms' ? `${v.toFixed(0)}ms` : v.toFixed(0)}/>
        {series.length > 1 && (
          <div className="flex items-center gap-3 flex-wrap mt-2">
            {widget.series.map((s, i) => (
              <div key={s.name} className="flex items-center gap-1 text-[11px] text-ink-600">
                <span className="w-2 h-2 rounded-full" style={{ background: s.color }}/>{s.name}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  } else if (widget.type === 'bar') {
    body = <BarChart data={widget.data} horizontal={widget.horizontal} height={widget.data.length * 28 + 16} yFormat={v => v >= 1000 ? `${(v/1000).toFixed(1)}k` : v.toFixed(0)}/>;
  } else if (widget.type === 'donut') {
    body = (
      <div className="flex items-center gap-5">
        <Donut data={widget.donut.data} size={150} centerValue={widget.donut.center} centerLabel={widget.donut.label}/>
        <div className="flex-1 space-y-1.5">
          {widget.donut.data.map(d => (
            <div key={d.label} className="flex items-center gap-2 text-[12px]">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: d.color }}/>
              <span className="flex-1 text-ink-700">{d.label}</span>
              <span className="mono text-ink-500">{d.value}%</span>
            </div>
          ))}
        </div>
      </div>
    );
  } else if (widget.type === 'gauge') {
    body = <div className="flex justify-center"><Gauge value={widget.gauge.value} max={widget.gauge.max} label="SLA %" /></div>;
  } else if (widget.type === 'heatmap') {
    const rows = USE_CASES.slice(0,6).map(u => u.name);
    const cols = MODELS.map(m => m.name.split('-')[0]);
    const data = rows.map((_, r) => cols.map((_, c) => 72 + ((r*7 + c*11) % 26)));
    body = <div className="flex justify-center"><Heatmap data={data} labelRows={rows} labelCols={cols} cellSize={48}/></div>;
  } else if (widget.type === 'tree') {
    body = (
      <div>
        <div className="flex items-center justify-between mb-2">
          <div className="text-[11px] text-ink-500">Click <span className="font-semibold text-ink-700">Open full tree</span> for drill-down, failure breakdown, and recent failed traces.</div>
          {onNavigate && (
            <Button variant="outline" size="sm" onClick={() => onNavigate('tree')}>
              Open full tree <I.arrow_right size={12}/>
            </Button>
          )}
        </div>
        <DecisionTree onSelectNode={()=>{}} selectedNode={null}/>
      </div>
    );
  } else if (widget.type === 'events') {
    body = <EventStream/>;
  }

  return (
    <WidgetFrame title={widget.title} subtitle={widget.subtitle} icon={icon} span={span} onRemove={onRemove} onPin={onPin} pinned={pinned} actions={actions} scrollX={widget.type === 'tree'} info={widget.info} infoTitle={widget.title}>
      {body}
    </WidgetFrame>
  );
};

    if (!text.trim()) return;

    setTimeout(() => {
      // Match to suggested or fallback
      const match = SUGGESTED_QUERIES.find(q => q.text.toLowerCase() === text.toLowerCase())
                 || SUGGESTED_QUERIES.find(q => text.toLowerCase().includes(q.text.toLowerCase().split(' ')[2]));

      const widget = WIDGET_LIB[widgetId];
      const exp = SAMPLE_EXPLANATIONS[widgetId] || 'Here is what I found based on your query.';
      setPreviewWidget(widget);
      setExplanation(exp);
      setMessages(m => [...m, { role: 'assistant', text: exp, widget }]);
      setHistory(h => [{ query: text, widget, ts: new Date().toISOString() }, ...h].slice(0, 10));
      setLoading(false);

      title={<span className="flex items-center gap-2">Trace <span className="mono text-ink-600">{trace.id}</span></span>}

        <div className="flex items-center gap-2 flex-wrap mb-4">
          <Badge tone={s.tone}>{s.label}</Badge>
          <Badge tone="neutral" className="mono">{trace.model}</Badge>
          <Badge tone="neutral">{trace.useCaseName}</Badge>

        <div className="grid grid-cols-5 gap-3 mb-4">
          <div className="bg-ink-50 rounded-lg p-2.5">
            <div className="text-[9px] uppercase text-ink-500 font-semibold">Latency</div>
            <div className="text-sm font-bold text-ink-900 mt-0.5 mono">{trace.latency}ms</div>
          </div>
          <div className="bg-ink-50 rounded-lg p-2.5">
            <div className="text-[9px] uppercase text-ink-500 font-semibold">Input tokens</div>
            <div className="text-sm font-bold text-ink-900 mt-0.5 mono">{trace.tokensIn.toLocaleString()}</div>
            {trace.tokensCached > 0 && <div className="text-[9px] text-emerald-600 mono">{trace.tokensCached} cached</div>}
          </div>
          <div className="bg-ink-50 rounded-lg p-2.5">
            <div className="text-[9px] uppercase text-ink-500 font-semibold">Output tokens</div>
            <div className="text-sm font-bold text-ink-900 mt-0.5 mono">{trace.tokensOut.toLocaleString()}</div>
          </div>
          <div className="bg-ink-50 rounded-lg p-2.5">
            <div className="text-[9px] uppercase text-ink-500 font-semibold">Cost</div>
            <div className="text-sm font-bold text-ink-900 mt-0.5 mono">${trace.cost.toFixed(4)}</div>
          </div>
          <div className="bg-ink-50 rounded-lg p-2.5">
            <div className="text-[9px] uppercase text-ink-500 font-semibold">Faithfulness</div>
            <div className={cn('text-sm font-bold mt-0.5 mono', trace.faithfulness >= 0.85 ? 'text-emerald-700' : trace.faithfulness >= 0.7 ? 'text-amber-700' : 'text-red-700')}>
              {trace.faithfulness.toFixed(2)}
            </div>
          </div>
        </div>

        <Tabs tabs={tabs} active={tab} onChange={setTab}/>
      </div>

      <div className="px-6 py-4">
        {tab === 'conversation' && (
          <div className="space-y-3">
            <div>
              <div className="text-[10px] uppercase font-semibold text-ink-500 mb-1">System prompt</div>
              <div className="bg-ink-50 rounded-lg p-3 text-[12.5px] text-ink-700 leading-relaxed mono">{trace.systemPrompt}</div>
            </div>
            <div>
              <div className="text-[10px] uppercase font-semibold text-ink-500 mb-1">User prompt</div>
              <div className="bg-white border border-ink-200 rounded-lg p-3 text-[12.5px] text-ink-800 leading-relaxed">{trace.prompt}</div>
            </div>
            <div>
              <div className="text-[10px] uppercase font-semibold text-ink-500 mb-1">Model output</div>
              <div className={cn('rounded-lg p-3 text-[12.5px] text-ink-800 leading-relaxed border',
                trace.status === 'corrected' || trace.status === 'failed' || trace.status === 'pii_blocked' ? 'bg-red-50 border-red-100' : 'bg-emerald-50 border-emerald-100')}

            </div>
            {trace.correctedOutput && (
              <div>
                <div className="text-[10px] uppercase font-semibold text-emerald-700 mb-1">Final output (after correction)</div>

                  dangerouslySetInnerHTML={{ __html: trace.correctedOutput.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>') }}/>
                <div className="text-[10px] text-ink-500 mt-1">Corrected by {trace.correctedBy}</div>
              </div>
            )}
          </div>
        )}

        {tab === 'metrics' && (
          <div className="space-y-4">
            <Card padding="p-4">
              <div className="flex items-center justify-between mb-2">
                <div className="text-sm font-semibold text-ink-800">Latency breakdown</div>
                <InfoTip text="Time spent in each phase of the request. High tool-call times often dominate for agentic workloads."/>
              </div>
              <BarChart data={latencyBars} horizontal={true} yFormat={v => v.toFixed(0)+'ms'}/>
            </Card>
            <div className="grid grid-cols-2 gap-3">
              <Card padding="p-4">
                <div className="text-sm font-semibold text-ink-800 mb-2 flex items-center gap-1.5">Quality scores <InfoTip text="Per-response quality metrics. Faithfulness measures grounding in source docs. Hallucination measures unsupported claims."/></div>
                <div className="space-y-2">
                  {[
                    { k: 'Faithfulness', v: trace.faithfulness, max: 1, good: v => v >= 0.85 },
                    { k: 'Hallucination', v: trace.hallucinationScore, max: 1, good: v => v <= 0.1 },
                    { k: 'Toxicity', v: trace.toxicity, max: 1, good: v => v <= 0.1 },
                  ].map(m => (
                    <div key={m.k}>
                      <div className="flex justify-between text-[11px] text-ink-600">
                        <span>{m.k}</span>
                        <span className="mono font-semibold">{m.v.toFixed(2)}</span>
                      </div>
                      <div className="h-1.5 bg-ink-100 rounded-full mt-1">
                        <div className={cn('h-full rounded-full', m.good(m.v) ? 'bg-emerald-500' : 'bg-amber-500')} style={{ width: `${m.v * 100}%` }}/>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
              <Card padding="p-4">
                <div className="text-sm font-semibold text-ink-800 mb-2 flex items-center gap-1.5">Economics <InfoTip text="Cost decomposition. Cached tokens are billed at ~10% of fresh-input rate."/></div>
                <div className="space-y-1.5 text-[12px]">
                  <div className="flex justify-between"><span className="text-ink-600">Fresh input tokens</span><span className="mono">{(trace.tokensIn - trace.tokensCached).toLocaleString()}</span></div>
                  <div className="flex justify-between"><span className="text-ink-600">Cached input tokens</span><span className="mono text-emerald-700">{trace.tokensCached.toLocaleString()}</span></div>
                  <div className="flex justify-between"><span className="text-ink-600">Output tokens</span><span className="mono">{trace.tokensOut.toLocaleString()}</span></div>
                  <div className="flex justify-between border-t border-ink-100 pt-1.5 mt-1.5"><span className="text-ink-800 font-semibold">Total cost</span><span className="mono font-bold">${trace.cost.toFixed(4)}</span></div>
                  <div className="flex justify-between"><span className="text-ink-500">Savings from cache</span><span className="mono text-emerald-700">${(trace.tokensCached * 0.0000027).toFixed(4)}</span></div>
                </div>
              </Card>
            </div>
          </div>
        )}

        {tab === 'tools' && (
          <div>
            {trace.tools.length === 0 ? (
              <div className="text-sm text-ink-500 text-center py-8">No tool calls in this trace.</div>
            ) : (
              <div className="space-y-2">
                <div className="text-[11px] text-ink-500 mb-2">Tool calls executed in sequence, annotated with latency and status.</div>
                {trace.tools.map((t, i) => (
                  <div key={i} className={cn('flex items-center gap-3 p-3 rounded-lg border',
                    t.status === 'ok' ? 'bg-white border-ink-200' : 'bg-red-50 border-red-200')}>
                    <div className="w-7 h-7 rounded-lg bg-ink-100 flex items-center justify-center text-ink-500"><I.zap size={14}/></div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[13px] font-medium text-ink-800 mono">{t.name}</div>
                      <div className="text-[10px] text-ink-500">status: {t.status}</div>

                    <div className="text-[11px] mono text-ink-700">{t.ms}ms</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {tab === 'correction' && trace.correctedOutput && (
          <div className="space-y-4">
            <div className="flex items-start gap-3 bg-amber-50 border border-amber-200 rounded-lg p-3">
              <I.info size={16} className="text-amber-700 flex-shrink-0 mt-0.5"/>
              <div className="text-[12.5px] text-amber-900"><strong>Correction reason:</strong> {trace.correctionNote}</div>
            </div>
            <div>
              <div className="text-[11px] uppercase font-semibold text-ink-700 mb-2">Before vs. after</div>
              <DiffView before={trace.output} after={trace.correctedOutput}/>
            </div>
            {trace.learnedRule && (
              <div className="bg-brand-50 border border-brand-200 rounded-lg p-4">
                <div className="flex items-start gap-3">
                  <div className="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center text-white"><I.brain size={16}/></div>
                  <div className="flex-1">
                    <div className="text-[11px] uppercase font-semibold text-brand-700 mb-1">What the system learned</div>
                    <div className="text-[13px] text-ink-800 leading-relaxed">{trace.learnedRule}</div>
                    <div className="flex items-center gap-2 mt-2.5">
                      {trace.learnedApplied

                  </div>
                </div>
              </div>

          </div>

      </div>
    </Dialog>

};

    { id: 'corrected',   label: 'Human corrected',  count: TRACES.filter(t => t.status === 'corrected').length },
    { id: 'rerun',       label: 'Rerun',            count: TRACES.filter(t => t.status === 'rerun').length },
    { id: 'failed',      label: 'Failed',           count: TRACES.filter(t => t.status === 'failed' || t.status === 'pii_blocked').length },
  ];

  const traces = TRACES.filter(t => {
    if (filter !== 'all') {
      if (filter === 'failed') { if (t.status !== 'failed' && t.status !== 'pii_blocked') return false; }
      else if (t.status !== filter) return false;
    }
    if (model !== 'all' && t.model !== MODELS.find(m => m.id === model)?.name) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!t.id.toLowerCase().includes(q) && !t.useCaseName.toLowerCase().includes(q) && !t.airline.toLowerCase().includes(q) && !t.prompt.toLowerCase().includes(q))
        return false;
    }
    return true;
  });

  return (
    <div className="p-6">
      <SectionHeader icon={<I.radar size={20}/>} title="Trace Explorer" desc="Every request, every response, every tool call — inspect any one."
        actions={<>
          <Button variant="outline"><I.download size={14}/> Export</Button>
          <Button variant="primary"><I.filter size={14}/> Advanced filters</Button>
        </>}/>

      <div className="grid grid-cols-4 gap-3 mb-4">
        <Card padding="p-4">
          <div className="flex items-center justify-between">
            <div className="text-[10px] uppercase text-ink-500 font-semibold">Total traces (24h)</div>
            <InfoTip text="Every model call is captured as a trace with full prompt, response, tools, and metrics."/>
          </div>
          <div className="text-xl font-bold text-ink-900 mt-1 mono">48,291</div>
        </Card>
        <Card padding="p-4">
          <div className="text-[10px] uppercase text-ink-500 font-semibold">Avg latency</div>
          <div className="text-xl font-bold text-ink-900 mt-1 mono">1,284ms</div>
        </Card>
        <Card padding="p-4">
          <div className="text-[10px] uppercase text-ink-500 font-semibold">Corrected / rerun</div>
          <div className="text-xl font-bold text-amber-600 mt-1 mono">2,134 <span className="text-sm text-ink-400">(4.4%)</span></div>
        </Card>
        <Card padding="p-4">
          <div className="text-[10px] uppercase text-ink-500 font-semibold">Spend (24h)</div>
          <div className="text-xl font-bold text-ink-900 mt-1 mono">$1,684.20</div>
        </Card>
      </div>

      <Card padding="p-0">
        <div className="flex items-center gap-3 p-3 border-b border-ink-100">
          <Input icon={<I.search size={14}/>} placeholder="Search traces by id, use case, airline, or prompt content…" value={search} onChange={e => setSearch(e.target.value)} className="flex-1"/>
          <Select value={model} onChange={setModel} options={[{ value: 'all', label: 'All models' }, ...MODELS.map(m => ({ value: m.id, label: m.name }))]}/>
        </div>
        <div className="flex items-center gap-1 px-3 py-2 border-b border-ink-100 bg-ink-50">
          {filters.map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              className={cn('px-3 py-1 text-[12px] rounded-md flex items-center gap-1.5 transition-colors',
                filter === f.id ? 'bg-white border border-ink-200 text-ink-900 shadow-soft' : 'text-ink-600 hover:text-ink-900')}>
              {f.label} <span className="mono text-[10px] text-ink-500">{f.count}</span>
            </button>
          ))}
        </div>
        <div className="max-h-[560px] overflow-y-auto">
          {traces.length === 0 ? (
            <div className="text-center text-ink-500 text-sm py-12">No traces match your filters.</div>
          ) : traces.map(t => <TraceRow key={t.id} trace={t} onClick={() => setSelected(t)}/>)}
        </div>
      </Card>

      {selected && <TraceDetail trace={selected} onClose={() => setSelected(null)}/>}
    </div>
  );
};

const DashboardPage = ({ widgets, setWidgets, timeRangeIdx, onOpenLibrary, onNavigate }) => {
  const [dragId, setDragId] = useState(null);
  const [overId, setOverId] = useState(null);

  const handleDragStart = (e, id) => {
    setDragId(id);
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', id); } catch (err) {}
  };
  const handleDragOver = (e, id) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (overId !== id) setOverId(id);
  };
  const handleDrop = (e, targetId) => {
    e.preventDefault();
    const sourceId = dragId || e.dataTransfer.getData('text/plain');
    setDragId(null); setOverId(null);
    if (!sourceId || sourceId === targetId) return;
    setWidgets(ws => {
      const from = ws.findIndex(w => w.id === sourceId);
      const to   = ws.findIndex(w => w.id === targetId);
      if (from < 0 || to < 0) return ws;
      const next = ws.slice();
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      return next;
    });
  };
  const handleDragEnd = () => { setDragId(null); setOverId(null); };

  const setSpan = (id, span) => {
    setWidgets(ws => ws.map(w => w.id === id ? { ...w, span } : w));
  };

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4">
        <div>
          <div className="flex items-center gap-3">
            <h1 className="text-[22px] font-bold text-ink-900">Aviation AI Operations</h1>
            <Badge tone="success" size="md"><span className="w-1.5 h-1.5 bg-emerald-500 rounded-full pulse-dot"/> Live</Badge>
          </div>
          <p className="text-sm text-ink-500 mt-0.5">Observability across flight ops models, pipelines, and cost.</p>
        </div>
        <div className="flex items-center gap-2">
          <Button variant="outline" size="md"><I.share size={14}/> Share</Button>
          <Button variant="outline" size="md"><I.download size={14}/> Export</Button>
          <Button variant="primary" size="md" onClick={onOpenLibrary}><I.plus size={14}/> Add widget</Button>
        </div>
      </div>

      {widgets.length > 0 && (
        <div className="mb-4 rounded-lg bg-gradient-to-r from-brand-50 to-violet-50 border border-brand-100 px-4 py-2.5 flex items-center gap-3">
          <div className="w-7 h-7 rounded-md bg-white/80 flex items-center justify-center text-brand-600 flex-shrink-0"><I.grip size={14}/></div>
          <div className="flex-1 min-w-0">
            <div className="text-[12.5px] text-ink-800 font-medium">Customize your dashboard</div>
            <div className="text-[11px] text-ink-600">Drag the <span className="font-semibold">⋮⋮</span> handle to reorder widgets. Use the <span className="font-semibold">S / M / L / XL</span> picker to resize. Hover a widget to reveal its controls.</div>
          </div>
          <Button size="sm" variant="outline" onClick={() => onNavigate && onNavigate('playground')}><I.sparkles size={12}/> Add from Playground</Button>
        </div>
      )}

      {widgets.length === 0 ? (
        <div className="grid-bg border-2 border-dashed border-ink-200 rounded-2xl py-20 flex flex-col items-center justify-center">
          <div className="w-16 h-16 rounded-2xl bg-white shadow-soft flex items-center justify-center text-brand-600 mb-3"><I.dashboard size={28}/></div>
          <div className="text-base font-semibold text-ink-800">Your dashboard is empty</div>
          <p className="text-sm text-ink-500 mt-1 max-w-md text-center">Start from the widget library or ask a question in the Playground — anything you build can be pinned here.</p>
          <div className="flex items-center gap-2 mt-4">
            <Button variant="primary" onClick={onOpenLibrary}><I.plus size={14}/> Browse widgets</Button>
            <Button variant="outline" onClick={() => onNavigate && onNavigate('playground')}><I.beaker size={14}/> Open playground</Button>
          </div>
        </div>
      ) : (
        <div className="grid grid-cols-12 gap-4 auto-rows-min">
          {widgets.map(w => {
            const span = w.span || WIDGET_TYPES[w.type]?.span || 'col-span-6';
            const isDragging = dragId === w.id;
            const isOver = overId === w.id && dragId && dragId !== w.id;
            return (
              <div key={w.id}
                className={cn(span, 'relative transition-all',
                  isDragging && 'opacity-40',
                  isOver && 'ring-2 ring-brand-500 ring-offset-2 rounded-xl')}
                draggable
                onDragStart={(e) => handleDragStart(e, w.id)}
                onDragOver={(e) => handleDragOver(e, w.id)}
                onDrop={(e) => handleDrop(e, w.id)}
                onDragEnd={handleDragEnd}
              >
                <WidgetRenderer widget={w} timeRangeIdx={timeRangeIdx}
                  onRemove={() => setWidgets(ws => ws.filter(x => x.id !== w.id))}
                  onPin={() => {}} pinned={true}
                  onNavigate={onNavigate}
                  span="col-span-12"
                  actions={
                    <>
                      <SpanPicker value={span} onChange={(s) => setSpan(w.id, s)}/>
                      <button title="Drag to reorder" className="p-1 rounded hover:bg-ink-100 text-ink-400 cursor-grab active:cursor-grabbing">
                        <I.grip size={14}/>
                      </button>
                    </>
                  }
                />
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

  ];
  const categoryLabels = { performance: 'System (Vitals)', quality: 'Quality (Brain)', cost: 'Cost (Wallet)', ethics: 'Responsible AI' };
  const subcategoryLabels = {
    latency: 'Latency', reliability: 'Throughput & Reliability', 'by-model': 'Per-model breakdown',

  };
  const items = WIDGET_LIBRARY.filter(w => filter === 'all' || w.category === filter)
    .filter(w => !search || w.title.toLowerCase().includes(search.toLowerCase()) || (w.info && w.info.toLowerCase().includes(search.toLowerCase())));

  // Group by category → subcategory for display
  const groups = [];

  items.forEach(w => {

    seen.add(key);
    groups.push({ key, category: w.category, subcategory: w.subcategory || 'other', items: items.filter(x => x.category === w.category && (x.subcategory || 'other') === (w.subcategory || 'other')) });

  return (

      {items.length === 0 && (
        <div className="py-16 text-center text-sm text-ink-500">No widgets match your search.</div>
      )}

      <div className="space-y-6">
        {groups.map(g => (
          <div key={g.key}>
            <div className="flex items-center gap-2 mb-2 px-1">
              <div className="text-[11px] uppercase font-semibold text-ink-500 tracking-wider">{categoryLabels[g.category]}</div>
              <div className="text-ink-300">/</div>
              <div className="text-[11px] uppercase font-semibold text-ink-700 tracking-wider">{subcategoryLabels[g.subcategory] || g.subcategory}</div>

            <div className="grid grid-cols-3 gap-3">

                const added = currentIds.includes(w.id);
                return (
                  <button key={w.id} onClick={() => !added && onAdd(w)} disabled={added}

                      added ? 'bg-ink-50 border-ink-200 opacity-60' : 'bg-white border-ink-200 hover:border-brand-400 hover:shadow-lift cursor-pointer')}>
                    <div className="flex items-center justify-between">
                      <Badge tone={

                        w.category === 'cost'        ? 'warning' : 'success'

    { id: 'main',    label: 'Workspace' },
    { id: 'pillars', label: 'Observability Pillars' },
  ];
  return (
    <aside className={cn('h-screen bg-white border-r border-ink-200 flex flex-col transition-all duration-200', collapsed ? 'w-16' : 'w-60')}>
      <div className={cn('flex items-center h-16 border-b border-ink-200 px-4', collapsed && 'justify-center')}>
        <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 via-violet-500 to-cyan-500 text-white flex items-center justify-center flex-shrink-0">
          <I.radar size={16}/>
        </div>
        {!collapsed && (
          <div className="ml-2.5">
            <div className="text-[15px] font-bold text-ink-900 leading-none">Skylens</div>
            <div className="text-[10px] text-ink-500 mt-0.5">AI Observability</div>
          </div>
        )}
      </div>

      <nav className="flex-1 overflow-y-auto px-2 py-3 space-y-4">
        {groups.map(g => (
          <div key={g.id}>
            {!collapsed && <div className="text-[10px] uppercase font-semibold text-ink-400 px-2 mb-1.5 tracking-wider">{g.label}</div>}
            <div className="space-y-0.5">
              {NAV.filter(n => n.group === g.id).map(n => (
                <button key={n.id} onClick={() => onChange(n.id)}
                  className={cn('w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-[13px] font-medium transition-colors',
                    active === n.id ? 'bg-ink-900 text-white' : 'text-ink-700 hover:bg-ink-100',
                    collapsed && 'justify-center')}
                  title={collapsed ? n.label : ''}>
                  {n.icon}
                  {!collapsed && <>
                    <span className="flex-1 text-left">{n.label}</span>
                    {n.badge && <Badge tone="purple" size="sm">{n.badge}</Badge>}
                  </>}
                </button>
              ))}
            </div>
          </div>
        ))}
      </nav>

      <div className="border-t border-ink-200 p-2">
        {NAV.filter(n => n.group === 'footer').map(n => (
          <button key={n.id} onClick={() => onChange(n.id)}
            className={cn('w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-[13px] font-medium transition-colors',
              active === n.id ? 'bg-ink-100 text-ink-900' : 'text-ink-600 hover:bg-ink-100',
              collapsed && 'justify-center')}>
            {n.icon}{!collapsed && <span>{n.label}</span>}
          </button>
        ))}
        {!collapsed && (
          <div className="mt-2 px-2 py-2 rounded-lg bg-gradient-to-br from-brand-50 to-violet-50 border border-brand-100">
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 rounded-full bg-white border border-ink-200 flex items-center justify-center text-brand-600 font-bold text-xs">AO</div>
              <div className="min-w-0">
                <div className="text-[12px] font-semibold text-ink-800 truncate">Aviation Ops</div>
                <div className="text-[10px] text-ink-500 truncate">workspace · enterprise</div>
              </div>
            </div>
          </div>
        )}
        <button onClick={onToggle} className="w-full mt-2 text-ink-400 hover:text-ink-700 text-[11px] px-2 py-1">
          {collapsed ? '›' : '‹ Collapse'}
        </button>
      </div>
    </aside>
  );
};

const Header = ({ timeRangeIdx, setTimeRangeIdx, model, setModel, useCase, setUseCase, onOpenLibrary, onOpenPlayground }) => (
  <header className="h-16 bg-white/80 backdrop-blur border-b border-ink-200 flex items-center px-6 gap-3 sticky top-0 z-30 glass">
    <div className="relative flex-1 max-w-md">
      <Input icon={<I.search size={14}/>} placeholder="Search metrics, models, runs, traces…" />
      <kbd className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-ink-400 bg-ink-100 px-1.5 py-0.5 rounded mono">⌘K</kbd>
    </div>
    <div className="flex items-center gap-2">
      <Select value={useCase} onChange={setUseCase} options={[
        { value: 'all', label: 'All use cases' },
        ...USE_CASES.map(u => ({ value: u.id, label: u.name }))
      ]}/>
      <Select value={model} onChange={setModel} options={[
        { value: 'all', label: 'All models' },
        ...MODELS.map(m => ({ value: m.id, label: m.name }))
      ]}/>
      <Select value={TIME_RANGES[timeRangeIdx].id} onChange={(id) => setTimeRangeIdx(TIME_RANGES.findIndex(t => t.id === id))}
        options={TIME_RANGES.map(t => ({ value: t.id, label: t.label }))}/>
      <button className="relative p-2 text-ink-600 hover:bg-ink-100 rounded-lg">
        <I.bell size={16}/>
        <span className="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-red-500 rounded-full"/>
      </button>
      <Button variant="primary" onClick={onOpenPlayground}><I.sparkles size={14}/> Ask Skylens</Button>
    </div>
  </header>
);

/* ============================================================
   MAIN APP
   ============================================================ */

const App = () => {
  const [page, setPage] = useState('playground');
  const [collapsed, setCollapsed] = useState(false);
  const [timeRangeIdx, setTimeRangeIdx] = useState(2);
  const [model, setModel] = useState('all');
  const [useCase, setUseCase] = useState('all');
  const [libraryOpen, setLibraryOpen] = useState(false);
  const [widgets, setWidgets] = useState(DEFAULT_DASHBOARD_IDS.map(id => WIDGET_LIB[id]).filter(Boolean));
  const [toast, setToast] = useState(null); // { widget, ts } | null

  const addWidget = (w) => {
    setWidgets(ws => ws.some(x => x.id === w.id) ? ws : [...ws, w]);
    setToast({ widget: w, ts: Date.now() });
  };

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 5000);
    return () => clearTimeout(t);
  }, [toast]);

  const onPageChange = (p) => {
    setPage(p);
    setLibraryOpen(false);
  };

  const currentIds = widgets.map(w => w.id);

  return (
    <div className="flex min-h-screen bg-ink-50">
      <Sidebar active={page} onChange={onPageChange} collapsed={collapsed} onToggle={() => setCollapsed(c => !c)}/>
      <div className="flex-1 flex flex-col min-w-0">
        <Header
          timeRangeIdx={timeRangeIdx} setTimeRangeIdx={setTimeRangeIdx}
          model={model} setModel={setModel}
          useCase={useCase} setUseCase={setUseCase}
          onOpenLibrary={() => setLibraryOpen(true)}
          onOpenPlayground={() => setPage('playground')}
        />
        <main className="flex-1 min-w-0">
          {page === 'dashboard'   && <DashboardPage widgets={widgets} setWidgets={setWidgets} timeRangeIdx={timeRangeIdx} onOpenLibrary={() => setLibraryOpen(true)} onNavigate={setPage}/>}
          {page === 'playground'  && <Playground onAddToDashboard={(w) => { addWidget(w); }} dashboardWidgets={widgets} onNavigate={setPage}/>}
          {page === 'traces'      && <TraceExplorerPage/>}
          {page === 'performance' && <SystemPerformancePage/>}
          {page === 'quality'     && <QualityPage onViewTree={() => setPage('tree')} onViewTraces={() => setPage('traces')}/>}
          {page === 'tree'        && <TreePage onViewTraces={() => setPage('traces')}/>}
          {page === 'cost'        && <CostPage onViewTraces={() => setPage('traces')}/>}
          {page === 'ethics'      && <EthicsPage onViewTraces={() => setPage('traces')}/>}
          {page === 'settings'    && (
            <div className="p-6">
              <SectionHeader icon={<I.settings size={20}/>} title="Settings" desc="Workspace, integrations, and alerting."/>
              <div className="grid grid-cols-2 gap-4">
                <Card>
                  <div className="text-sm font-semibold text-ink-800 mb-3">Integrations</div>
                  {['SkyForge Model Registry','Aviation Incident Log','Flight Ops Postgres','Slack — on-call','PagerDuty'].map(n => (
                    <div key={n} className="flex items-center justify-between py-2 border-b border-ink-100 last:border-0">
                      <div className="text-[13px] text-ink-800">{n}</div>
                      <Toggle checked={true} onChange={() => {}}/>
                    </div>
                  ))}
                </Card>
                <Card>
                  <div className="text-sm font-semibold text-ink-800 mb-3">Alert channels</div>
                  {['Slack #ai-ops','Email — ops@aerobrand.test','Webhook — incident-bus'].map(n => (
                    <div key={n} className="flex items-center justify-between py-2 border-b border-ink-100 last:border-0">
                      <div className="text-[13px] text-ink-800">{n}</div>
                      <Toggle checked={true} onChange={() => {}}/>
                    </div>
                  ))}
                </Card>
              </div>
            </div>
          )}
        </main>
      </div>

      <AddWidgetModal
        open={libraryOpen} onClose={() => setLibraryOpen(false)}
        onAdd={(w) => { addWidget(w); setLibraryOpen(false); }}
        currentIds={currentIds}
      />

      {/* Floating hint */}
      {page === 'dashboard' && widgets.length > 0 && (
        <div className="fixed bottom-6 right-6 z-40">
          <button onClick={() => setPage('playground')}
            className="group flex items-center gap-2 px-4 h-11 rounded-full bg-ink-900 text-white shadow-float hover:bg-ink-800">
            <span className="w-6 h-6 rounded-full bg-gradient-to-br from-brand-400 to-violet-400 flex items-center justify-center"><I.sparkles size={12}/></span>
            <span className="text-[13px] font-medium">Ask Skylens</span>
            <kbd className="text-[10px] bg-white/10 px-1.5 py-0.5 rounded mono">⌘K</kbd>
          </button>
        </div>
      )}

      {/* Add-to-dashboard toast */}
      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 slide-up">
          <div className="bg-ink-900 text-white rounded-xl shadow-float px-4 py-3 flex items-center gap-3 border border-ink-800">
            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center flex-shrink-0">
              <I.check size={16}/>
            </div>
            <div className="min-w-0">
              <div className="text-[13px] font-semibold truncate max-w-[280px]">Added to dashboard</div>
              <div className="text-[11px] text-ink-300 truncate max-w-[280px]">{toast.widget.title}</div>
            </div>
            {page !== 'dashboard' && (
              <button onClick={() => { setPage('dashboard'); setToast(null); }}
                className="ml-2 text-[12px] font-medium px-3 h-8 rounded-lg bg-white text-ink-900 hover:bg-ink-100 flex items-center gap-1">
                View dashboard <I.arrow_right size={12}/>
              </button>
            )}
            <button onClick={() => setToast(null)} className="p-1 text-ink-400 hover:text-white rounded">
              <I.close size={14}/>
            </button>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
